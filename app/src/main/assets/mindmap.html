<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --label-color: #334155;
            --label-shadow: rgba(255, 255, 255, 0.9);
            --link-color: rgba(0, 0, 0, 0.15);
            --link-label: #64748b;
            --link-label-shadow: rgba(255, 255, 255, 0.9);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #ffffff;
                --label-color: #e2e8f0;
                --label-shadow: rgba(0, 0, 0, 0.9);
                --link-color: rgba(255, 255, 255, 0.15);
                --link-label: #9ca3af;
                --link-label-shadow: rgba(0, 0, 0, 0.8);
            }
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
            width: 100vw;
            height: 100vh;
        }
        svg {
            width: 100vw;
            height: 100vh;
            display: block;
            background: var(--bg-color);
        }
        .node {
            cursor: pointer;
            transition: r 0.3s ease, filter 0.3s ease;
        }
        .node:hover {
            filter: brightness(1.3) contrast(1.1);
        }
        .link {
            stroke-width: 1.5px;
            stroke-dasharray: 4 4;
            animation: dash 15s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -40;
            }
        }
        .label {
            font-size: 11px;
            font-weight: 500;
            fill: var(--label-color);
            text-shadow: 0 2px 4px var(--label-shadow);
            pointer-events: none;
            transition: fill 0.2s;
        }
        .link-labels text {
            font-size: 8px;
            fill: var(--link-label);
            text-shadow: 0 1px 2px var(--link-label-shadow);
            text-anchor: middle;
        }
        .glow {
            filter: drop-shadow(0px 0px 8px var(--glow-color));
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="./d3.v7.min.js"></script>
</head>
<body>
<svg id="graph"></svg>
<script>
    const svg = d3.select("#graph");
    const width = window.innerWidth || document.documentElement.clientWidth;
    const height = window.innerHeight || document.documentElement.clientHeight;

    svg.attr("width", width).attr("height", height);

    let g = svg.append("g");

    const zoom = d3.zoom()
        .scaleExtent([0.2, 4])
        .on("zoom", (event) => {
            g.attr("transform", event.transform);
        });
    svg.call(zoom);

    let simulation = d3.forceSimulation()
        .force("link", d3.forceLink().id(d => d.id).distance(120))
        .force("charge", d3.forceManyBody().strength(-250))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(45));

    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        svg.attr("width", w).attr("height", h);
        simulation.force("center", d3.forceCenter(w / 2, h / 2));
    });

    let nodeGroupGlobal = null;
    let linkGlobal = null;
    let linkLabelGlobal = null;
    let isConnectedGlobal = null;
    let selectedNode = null;

    /**
     * Centra y resalta un nodo por su nombre (llamado desde Android vía evaluateJavascript).
     * Devuelve true si encontró el nodo, false si no existe en el grafo actual.
     */
    function highlightNode(conceptName) {
        if (!conceptName) return false;
        return searchNode(conceptName);
    }

    function searchNode(query) {
        if (!query || query.trim() === "") {
            if (selectedNode) {
                selectedNode = null;
                if (nodeGroupGlobal) nodeGroupGlobal.style("opacity", 1).style("filter", "");
                if (linkGlobal) linkGlobal.style("opacity", 1);
                if (linkLabelGlobal) linkLabelGlobal.style("opacity", 1);
            }
            return false;
        }
        
        const q = query.toLowerCase();
        let foundNode = null;
        
        if (nodeGroupGlobal) {
            nodeGroupGlobal.each(function(d) {
                if (!foundNode && d.label && d.label.toLowerCase().includes(q)) {
                    foundNode = d;
                }
            });
        }
        
        if (foundNode) {
            selectedNode = foundNode;
            
            if (nodeGroupGlobal) {
                nodeGroupGlobal.style("opacity", o => isConnectedGlobal(foundNode, o) ? 1 : 0.1)
                         .style("filter", o => o.id === foundNode.id ? "brightness(1.5)" : "");
            }
            if (linkGlobal) {
                linkGlobal.style("opacity", o => (o.source.id === foundNode.id || o.target.id === foundNode.id) ? 1 : 0.05);
            }
            if (linkLabelGlobal) {
                linkLabelGlobal.style("opacity", o => (o.source.id === foundNode.id || o.target.id === foundNode.id) ? 1 : 0.05);
            }
            
            const scale = 1.5;
            const x = width / 2 - foundNode.x * scale;
            const y = height / 2 - foundNode.y * scale;
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(x, y).scale(scale));
            
            if (window.AndroidBridge && typeof window.AndroidBridge.onConceptSelected === 'function') {
                window.AndroidBridge.onConceptSelected(foundNode.id);
            }
            return true;
        }
        return false;
    }

    function loadGraph(nodesJsonStr, edgesJsonStr) {
        let decodedNodes = nodesJsonStr;
        let decodedEdges = edgesJsonStr;
        try {
            if (nodesJsonStr && !nodesJsonStr.trim().startsWith('[')) {
                decodedNodes = decodeURIComponent(escape(window.atob(nodesJsonStr)));
            }
        } catch(e) {
            console.error("Error decoding nodes Base64:", e);
        }
        try {
            if (edgesJsonStr && !edgesJsonStr.trim().startsWith('[')) {
                decodedEdges = decodeURIComponent(escape(window.atob(edgesJsonStr)));
            }
        } catch(e) {
            console.error("Error decoding edges Base64:", e);
        }
        updateGraphData(decodedNodes, decodedEdges);
    }

    function updateGraphData(nodesJsonStr, edgesJsonStr) {
        if (simulation) {
            simulation.stop();
        }
        g.selectAll("*").remove();

        const defs = g.append("defs");
        defs.append("marker")
            .attr("id", "arrow")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 22)
            .attr("refY", 0)
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "rgba(59, 130, 246, 0.6)");

        const nodesRaw = JSON.parse(nodesJsonStr);
        const linksRaw = JSON.parse(edgesJsonStr);

        const nodes = nodesRaw.filter(n => n.type !== "note");
        const courseNode = nodes.find(n => n.type === "course");

        let links = linksRaw.filter(l => l.type !== "HAS_NOTE" && l.type !== "MENTIONS");

        const targetIds = new Set(links.filter(l => l.type === 'RELATED_TO').map(l => l.target));

        if (courseNode) {
            nodes.forEach(n => {
                // Solo conectar conceptos "raíz" (que no son dependencias de otros) al nodo del curso central
                if (n.type === "concept" && !targetIds.has(n.id)) {
                    links.push({
                        source: n.id,
                        target: courseNode.id,
                        type: "BELONGS_TO"
                    });
                }
            });
        }

        const linkedByIndex = {};
        links.forEach(d => {
            linkedByIndex[`${d.source},${d.target}`] = true;
            linkedByIndex[`${d.target},${d.source}`] = true;
        });

        function isConnected(a, b) {
            return linkedByIndex[`${a.id},${b.id}`] || a.id === b.id;
        }
        isConnectedGlobal = isConnected;

        svg.on("click", () => {
            if (selectedNode) {
                selectedNode = null;
                nodeGroup.style("opacity", 1).style("filter", "");
                link.style("opacity", 1);
                if (linkLabel) linkLabel.style("opacity", 1);
            }
        });

        const link = g.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(links)
            .enter().append("line")
            .attr("class", "link")
            .style("stroke", d => {
                if (d.type === "MENTIONS") return "rgba(147, 51, 234, 0.4)";
                if (d.type === "BELONGS_TO") return "rgba(168, 85, 247, 0.2)";
                if (d.type === "RELATED_TO") return "rgba(59, 130, 246, 0.6)";
                return "var(--link-color)";
            })
            .attr("marker-end", d => d.type === "RELATED_TO" ? "url(#arrow)" : "");
        linkGlobal = link;

        const linkLabel = g.append("g")
            .attr("class", "link-labels")
            .selectAll("text")
            .data(links.filter(d => d.label))
            .enter().append("text")
            .text(d => d.label);
        linkLabelGlobal = linkLabel;

        const nodeGroup = g.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(nodes)
            .enter().append("g")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended))
            .on("click", (event, d) => {
                event.stopPropagation();
                
                if (selectedNode === d) {
                    selectedNode = null;
                    nodeGroup.style("opacity", 1).style("filter", "");
                    link.style("opacity", 1);
                    if (linkLabelGlobal) linkLabelGlobal.style("opacity", 1);
                } else {
                    selectedNode = d;
                    nodeGroup.style("opacity", o => isConnected(d, o) ? 1 : 0.1)
                             .style("filter", o => o.id === d.id ? "brightness(1.5)" : "");
                    link.style("opacity", o => (o.source.id === d.id || o.target.id === d.id) ? 1 : 0.05);
                    if (linkLabelGlobal) linkLabelGlobal.style("opacity", o => (o.source.id === d.id || o.target.id === d.id) ? 1 : 0.05);
                }

                if (window.AndroidBridge && typeof window.AndroidBridge.onConceptSelected === 'function') {
                    window.AndroidBridge.onConceptSelected(d.id);
                }
            });
        nodeGroupGlobal = nodeGroup;

        nodeGroup.append("circle")
            .attr("class", "node glow")
            .attr("r", d => {
                if (d.type === "course") return 26;
                if (d.type === "note") return 20;
                return 16;
            })
            .style("fill", d => {
                if (d.type === "course") return "#a855f7";
                if (d.type === "note") return "#3b82f6";
                return d.review_pending ? "#ef4444" : "#10b981";
            })
            .style("--glow-color", d => {
                if (d.type === "course") return "rgba(168, 85, 247, 0.6)";
                if (d.type === "note") return "rgba(59, 130, 246, 0.6)";
                return d.review_pending ? "rgba(239, 68, 68, 0.6)" : "rgba(16, 185, 129, 0.6)";
            });

        nodeGroup.append("circle")
            .attr("r", d => {
                if (d.type === "course") return 10;
                if (d.type === "note") return 6;
                return 4;
            })
            .style("fill", "#ffffff")
            .style("opacity", 0.9);

        nodeGroup.append("text")
            .attr("class", "label")
            .attr("dy", d => {
                if (d.type === "course") return 40;
                if (d.type === "note") return 32;
                return 28;
            })
            .attr("text-anchor", "middle")
            .text(d => d.label);

        simulation.nodes(nodes);
        simulation.force("link").links(links);
        simulation.alpha(1).restart();

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            if (linkLabel) {
                linkLabel
                    .attr("x", d => (d.source.x + d.target.x) / 2)
                    .attr("y", d => (d.source.y + d.target.y) / 2);
            }

            nodeGroup
                .attr("transform", d => `translate(${d.x}, ${d.y})`);
        });
    }

    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }
</script>
</body>
</html>
